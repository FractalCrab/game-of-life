<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Conway's Game of Life</title>
        <link rel="stylesheet" href="static/style.css" />
    </head>

    <body>
        <main class="container">
            <h1>Conway's Game of Life</h1>

            <section class="game-info" aria-label="Game status">
                <div class="generation-counter">
                    Generation:
                    <span id="generation-count">0</span>
                </div>
                <div>
                    Auto-play:
                    <span
                        class="auto-play-indicator"
                        id="auto-play-indicator"
                        aria-hidden="true"
                    ></span>
                </div>
            </section>

            <div class="controls">
                <button class="btn btn-primary" id="next-btn" type="button">
                    Next Generation
                </button>

                <button
                    class="btn btn-success"
                    id="auto-play-btn"
                    type="button"
                >
                    Start Auto-play
                </button>

                <button class="btn btn-warning" id="random-btn" type="button">
                    Random Fill
                </button>

                <button class="btn btn-danger" id="clear-btn" type="button">
                    Clear Grid
                </button>
            </div>

            <div class="speed-control">
                <label for="speed-slider">Speed:</label>
                <input
                    type="range"
                    id="speed-slider"
                    min="100"
                    max="2000"
                    value="500"
                    step="100"
                />
                <span id="speed-display">500ms</span>
            </div>

            <div class="game-container">
                <div
                    id="grid"
                    aria-label="Game of Life grid"
                    role="group"
                ></div>
            </div>

            <section class="patterns">
                <h2>Classic Patterns</h2>
                <div class="pattern-buttons">
                    <button
                        class="btn-pattern"
                        data-pattern="glider"
                        type="button"
                    >
                        Glider
                    </button>
                    <button
                        class="btn-pattern"
                        data-pattern="blinker"
                        type="button"
                    >
                        Blinker
                    </button>
                    <button
                        class="btn-pattern"
                        data-pattern="block"
                        type="button"
                    >
                        Block
                    </button>
                    <button
                        class="btn-pattern"
                        data-pattern="beacon"
                        type="button"
                    >
                        Beacon
                    </button>
                    <button
                        class="btn-pattern"
                        data-pattern="toad"
                        type="button"
                    >
                        Toad
                    </button>
                </div>
            </section>
        </main>

        <script src="static/script.js"></script>
    </body>
</html>
